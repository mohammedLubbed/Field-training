<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>حجز استشارة | استشارات الأسنان</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand">
        <img class="logo" src="img/logo.png" alt="شعار الأسنان">
        <span>استشارات الأسنان</span>
      </div>
      <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="doctors.html">الأطباء</a>
        <a href="booking.html">الحجز</a>
        <a href="articles.html">مقالات</a>
        <a href="faq.html">الأسئلة الشائعة</a>
        <a href="contact.html" class="cta">تواصل</a>
      </div>
      <a class="cta" href="booking.html">حجز استشارة</a>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">حجز استشارة</h2>
        <span class="small">املأ البيانات وسيتم التواصل لتأكيد الموعد</span>
      </div>

      <form id="bookingForm" class="form">
        <div class="field">
          <label for="name">الاسم الكامل</label>
          <input id="name" name="name" type="text" placeholder="اكتب اسمك" required />
        </div>
        <div class="field">
          <label for="phone">رقم الهاتف</label>
          <input id="phone" name="phone" type="tel" placeholder="05XXXXXXXX" required />
        </div>
        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" name="email" type="email" placeholder="name@example.com" required />
        </div>
        <div class="field">
          <label for="service">الخدمة</label>
          <select id="service" name="service" required>
            <option value="">اختر خدمة</option>
            <option>استشارة طب أسنان عام</option>
            <option>تجميل الأسنان</option>
            <option>حشوات وتنظيف</option>
          </select>
        </div>
        <div class="field">
          <label for="date">التاريخ</label>
          <input id="date" name="date" type="date" required />
        </div>
        <div class="field">
          <label for="time">الوقت المفضل</label>
          <select id="time" name="time" required>
            <option value="">اختر وقتًا</option>
            <option>09:00</option>
            <option>11:00</option>
            <option>14:00</option>
            <option>16:00</option>
          </select>
        </div>
        <div class="field full">
          <label for="notes">ملاحظات عامة</label>
          <textarea id="notes" name="notes" placeholder="وصف الحالة أو استفسار عام"></textarea>
        </div>
        <div class="field full actions">
          <button class="btn primary" type="submit">إرسال الطلب</button>
          <a href="doctors.html" class="btn">عرض الأطباء</a>
        </div>
      </form>
      <p id="bookingMsg" class="small" style="margin-top:10px;"></p>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="brand">
        <img class="logo" src="img/logo.png" alt="شعار الأسنان">
        <span>استشارات الأسنان</span>
      </div>
      <p class="small">© <span id="year"></span> جميع الحقوق محفوظة.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
